# IVY TalkTalk — staging stack. Amoeba Structure v2 §5.1.
# Run: docker compose -f docker/staging/docker-compose.staging.yml \
#        --env-file docker/staging/.env.staging up -d --build
# Build context is the repo root (../..) so turbo sees the whole workspace.
services:
  api:
    build:
      context: ../..
      dockerfile: docker/staging/Dockerfile.api
    container_name: ivy_api_staging
    restart: unless-stopped
    env_file:
      - ./.env.staging
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    expose:
      - '3000'

  web:
    build:
      context: ../..
      dockerfile: docker/staging/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ivy_web_staging
    restart: unless-stopped
    expose:
      - '80'

  mysql:
    image: mysql:8.0
    container_name: ivy_mysql_staging
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3317:3306'
    volumes:
      - ivy_mysql_staging_data:/var/lib/mysql
      # Schema migration reference (TypeORM synchronize may be off in staging).
      - ../init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ivy_redis_staging
    restart: unless-stopped
    volumes:
      - ivy_redis_staging_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ivy_rabbitmq_staging
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ivy_rabbitmq_staging_data:/var/lib/rabbitmq

  nginx:
    image: nginx:alpine
    container_name: ivy_nginx_staging
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - '8080:80'

volumes:
  ivy_mysql_staging_data:
  ivy_redis_staging_data:
  ivy_rabbitmq_staging_data:
