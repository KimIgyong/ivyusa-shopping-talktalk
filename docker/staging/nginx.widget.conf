# Static widget SPA baked into the widget image (apps/widget/dist), served under /widget/.
# Build base is /widget/, so index.html references /widget/assets/...
server {
    listen 80;
    server_name _;

    # Compression (PERF-4): ~68% transfer cut on JS/CSS/JSON.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;


    # Security headers (SEC-L2/INF-4). NOTE: the widget is intentionally embeddable
    # in storefront iframes, so we do NOT set X-Frame-Options/frame-ancestors here.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /widget { return 301 /widget/; }

    location /widget/ {
        alias /usr/share/nginx/html/;
        try_files $uri /widget/index.html;
    }

    location /widget/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
