# IVY TalkTalk — edge reverse proxy, production. Amoeba Structure v2 §5.1.
# Routes /api/ → api:3000, everything else → web:80.
upstream ivy_api {
    server api:3000;
}
upstream ivy_web {
    server web:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # API → NestJS (it serves under API_PREFIX=api/v1, so keep the /api prefix).
    location /api/ {
        proxy_pass http://ivy_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else → static web SPA.
    location / {
        proxy_pass http://ivy_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
