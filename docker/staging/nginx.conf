# IVY TalkTalk — edge reverse proxy, staging. Amoeba Structure v2 §5.1.
# Routes /widget → widget:80, /api/ → api:3000, everything else → web:80.
# Uses the docker embedded DNS resolver + variable proxy_pass so upstreams are
# re-resolved at runtime — recreated app containers (new IPs) won't cause stale
# 404/502 (the deploy script also reloads this nginx).

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Customer widget (Vite SPA built with base /widget/).
    location /widget {
        set $upstream_widget widget:80;
        proxy_pass http://$upstream_widget;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API → NestJS (serves under API_PREFIX=api/v1, so keep the /api prefix).
    location /api/ {
        set $upstream_api api:3000;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else → admin web SPA.
    location / {
        set $upstream_web web:80;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
