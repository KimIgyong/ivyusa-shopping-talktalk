name: CI

# Build-green gate for pull requests and pushes to the integration branches.
# Runs the same checks the deploy checklist requires (typecheck + tests + build)
# so regressions are caught before merge instead of at deploy time.

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
