# Static widget SPA baked into the widget image (apps/widget/dist), served under /widget/.
# Build base is /widget/, so index.html references /widget/assets/...
server {
    listen 80;
    server_name _;

    location = /widget { return 301 /widget/; }

    location /widget/ {
        alias /usr/share/nginx/html/;
        try_files $uri /widget/index.html;
    }

    location /widget/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
