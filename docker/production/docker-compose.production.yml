# IVY TalkTalk — production stack. Amoeba Structure v2 §5.1.
# Run: docker compose -f docker/production/docker-compose.production.yml \
#        --env-file docker/production/.env.production up -d --build
# Build context is the repo root (../..) so turbo sees the whole workspace.
# Production-tuned: restart: always, no DB/queue ports exposed to host.
services:
  api:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.api
    container_name: ivy_api_production
    restart: always
    env_file:
      - ./.env.production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ../..
      dockerfile: docker/production/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ivy_web_production
    restart: always
    expose:
      - '80'

  mysql:
    image: mysql:8.0
    container_name: ivy_mysql_production
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    # No host port published in production — DB is internal-network only.
    volumes:
      - ivy_mysql_production_data:/var/lib/mysql
      # Schema is applied via migrations (DB_SYNCHRONIZE=false).
      - ../init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ivy_redis_production
    restart: always
    volumes:
      - ivy_redis_production_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ivy_rabbitmq_production
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ivy_rabbitmq_production_data:/var/lib/rabbitmq

  nginx:
    image: nginx:alpine
    container_name: ivy_nginx_production
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - '80:80'

volumes:
  ivy_mysql_production_data:
  ivy_redis_production_data:
  ivy_rabbitmq_production_data:
