# Static SPA server baked into the web image (apps/web/dist). Production.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (SEC-L2/INF-4). The admin console must never be framed
    # (clickjacking). `always` so they apply to error responses too.
    # HSTS is honored only when received over TLS — it passes through the host
    # TLS proxy to the browser; direct-HTTP (dev) responses carry it harmlessly.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets. (nginx does not inherit server-level add_header
    # into a location that declares its own, so restate nosniff here.)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
